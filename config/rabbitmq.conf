# rabbitmq.conf — edit here, commit, push. GitHub Actions will restart the container.

# ─── NETWORKING ───────────────────────────────────────────────────────────────
listeners.tcp.default = 5672
management.tcp.port   = 15672

# ─── MEMORY & DISK ────────────────────────────────────────────────────────────
# Trigger flow control when RAM usage exceeds 40% of available memory
vm_memory_high_watermark.relative = 0.4

# Trigger flow control when free disk space drops below 1GB
disk_free_limit.absolute = 1GB

# ─── DEFINITIONS ──────────────────────────────────────────────────────────────
# Load exchanges, queues, and bindings from definitions.json on every boot.
# This ensures the topology is always in sync with the repo.
load_definitions = /etc/rabbitmq/definitions.json

# ─── LOGGING ──────────────────────────────────────────────────────────────────
log.console      = true
log.console.level = info
