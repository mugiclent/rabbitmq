name: Deploy RabbitMQ

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            DEPLOY_DIR="$HOME/katisha/rabbitmq"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            if [ -d "$DEPLOY_DIR/.git" ]; then
              cd "$DEPLOY_DIR"
              git pull origin main
            else
              mkdir -p "$HOME/katisha"
              git clone "$REPO_URL" "$DEPLOY_DIR"
              cd "$DEPLOY_DIR"
            fi

            # Authenticate with Infisical universal auth and get a short-lived token.
            # The token is used for the run command — credentials never touch disk.
            INFISICAL_TOKEN=$(infisical login \
              --method=universal-auth \
              --client-id=${{ secrets.INFISICAL_CLIENT_ID }} \
              --client-secret=${{ secrets.INFISICAL_CLIENT_SECRET }} \
              --domain=http://localhost:8080 \
              --plain --silent)

            # Fetch secrets from Infisical and inject them at runtime.
            infisical run \
              --token="$INFISICAL_TOKEN" \
              --projectId=${{ secrets.INFISICAL_PROJECT_ID }} \
              --env=dev \
              --path=/rabbitmq \
              --domain=http://localhost:8080 \
              -- docker compose up -d --build

            echo "Waiting for rabbitmq to be healthy..."
            for i in $(seq 1 30); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' rabbitmq 2>/dev/null || echo "missing")
              [ "$STATUS" = "healthy" ] && break
              [ $i -eq 30 ] && echo "Timed out waiting for rabbitmq" && exit 1
              sleep 3
            done

            echo "RabbitMQ is up."
